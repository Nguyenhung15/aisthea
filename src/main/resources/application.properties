# ===================================================================
# APPLICATION SETTINGS
# ===================================================================
app.name=AISTHEA Fashion
app.version=1.0.0
app.upload.dir=E:/aisthea_uploads/uploads
app.upload.avatar.dir=E:/aisthea_uploads/uploads/avatars
app.upload.product.dir=E:/aisthea_uploads/uploads/products
app.max.upload.size=10485760
app.allowed.upload.extensions=jpg,jpeg,png,gif

# Session timeout (in minutes)
app.session.timeout=30

# Password reset token expiration (in minutes)
security.token.reset.expiry=30

# Email verification token expiration (in hours)
security.token.verify.expiry=24

# Token settings
security.token.verify.length=32

# Password security
security.password.bcrypt.cost=12
security.password.min.length=8
security.password.max.length=100

# URL Access Control (Comma-separated)
security.urls.public=/login,/register,/forgot-password,/reset-password,/activate,/google-login,/assets/*,/uploads/*
security.urls.admin=/admin/*,/dashboard,/category,/user,/product-management

# ===================================================================
# APPLICATION URLs (for dynamic URL building)
# ===================================================================
app.base.url=http://localhost:8080/FashionProject
app.activation.url=${app.base.url}/activate
app.reset.password.url=${app.base.url}/reset

# ===================================================================
# LOGGING CONFIGURATION
# ===================================================================
# Log levels: TRACE, DEBUG, INFO, WARN, ERROR
log.level.root=INFO
log.level.app=DEBUG
log.file.path=logs
log.file.name=aisthea

# ===================================================================
# SECURITY SETTINGS
# ===================================================================
security.csrf.enabled=true
security.xss.protection=true
security.clickjacking.protection=true

# ===================================================================
# ENVIRONMENT
# ===================================================================
# Values: development, staging, production
app.environment=development
