<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E1F5FE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="800" fill="url(#bg)"/>
  
  <!-- Image Icon -->
  <g transform="translate(300, 320)">
    <circle cx="0" cy="0" r="80" fill="#0288D1" opacity="0.1"/>
    <path d="M-40,-20 L-40,20 L40,20 L40,-20 Z M-30,-10 L-30,10 L30,10 L30,-10 Z" 
          fill="none" stroke="#0288D1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="-15" cy="-2" r="5" fill="#0288D1"/>
    <path d="M-20,10 L-5,-5 L10,10 L20,0 L30,10" 
          fill="none" stroke="#0288D1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Brand Name -->
  <text x="300" y="450" font-family="'Playfair Display', serif" font-size="42" 
        font-weight="600" fill="#024acf" text-anchor="middle" letter-spacing="8">
    AISTHÉA
  </text>
  
  <!-- Subtitle -->
  <text x="300" y="490" font-family="'Manrope', sans-serif" font-size="16" 
        fill="#94a3b8" text-anchor="middle" letter-spacing="2">
    IMAGE COMING SOON
  </text>
</svg>
