<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Search Debug</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 40px;
            max-width: 800px;
            margin: auto;
        }

        #log {
            background: #f4f4f4;
            padding: 20px;
            border-radius: 8px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 13px;
            max-height: 500px;
            overflow-y: auto;
        }

        button {
            padding: 10px 24px;
            background: #024acf;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin: 8px 4px;
        }

        button:hover {
            background: #0243b0;
        }

        h2 {
            color: #333;
        }
    </style>
</head>

<body>
    <h2>🔍 Search Debug Tool</h2>
    <p>Bấm nút dưới để test từng bước:</p>

    <button onclick="testFetch()">1. Test Fetch /product?page=1</button>
    <button onclick="testParse()">2. Parse & Find Cards</button>
    <button onclick="testSearch('áo')">3. Search "áo"</button>
    <button onclick="testSearch('quần')">4. Search "quần"</button>
    <button onclick="clearLog()">Clear Log</button>

    <div id="log">Click a button to start debugging...\n</div>

    <script>
        var logEl = document.getElementById('log');
        var fetchedHtml = null;
        var parsedDoc = null;
        var allProducts = [];

        function log(msg) {
            logEl.textContent += '\n' + msg;
            logEl.scrollTop = logEl.scrollHeight;
        }
        function clearLog() { logEl.textContent = ''; }

        // Detect context path
        var path = window.location.pathname;
        var ctxPath = path.substring(0, path.lastIndexOf('/'));
        log('Context path: ' + ctxPath);

        function testFetch() {
            log('\n=== STEP 1: Fetching ' + ctxPath + '/product?page=1 ===');
            fetch(ctxPath + '/product?page=1')
                .then(function (r) {
                    log('Response status: ' + r.status);
                    log('Content-Type: ' + r.headers.get('content-type'));
                    return r.text();
                })
                .then(function (html) {
                    fetchedHtml = html;
                    log('HTML length: ' + html.length + ' characters');
                    log('Contains "group cursor-pointer": ' + (html.indexOf('group cursor-pointer') !== -1));
                    log('Contains "action=view": ' + (html.indexOf('action=view') !== -1));
                    log('Contains "productList": ' + (html.indexOf('productList') !== -1));

                    // Show first 300 chars
                    log('\nFirst 300 chars:\n' + html.substring(0, 300));

                    // Find all occurrences of "group cursor-pointer"
                    var count = 0;
                    var idx = 0;
                    while ((idx = html.indexOf('group cursor-pointer', idx)) !== -1) {
                        count++;
                        idx += 20;
                    }
                    log('\nOccurrences of "group cursor-pointer": ' + count);
                })
                .catch(function (err) {
                    log('FETCH ERROR: ' + err.message);
                });
        }

        function testParse() {
            if (!fetchedHtml) { log('ERROR: Run Step 1 first!'); return; }

            log('\n=== STEP 2: Parsing HTML ===');
            var parser = new DOMParser();
            parsedDoc = parser.parseFromString(fetchedHtml, 'text/html');

            // Try different selectors
            var sel1 = parsedDoc.querySelectorAll('div.group');
            log('div.group: ' + sel1.length + ' found');

            var sel2 = parsedDoc.querySelectorAll('div.group.cursor-pointer');
            log('div.group.cursor-pointer: ' + sel2.length + ' found');

            var sel3 = parsedDoc.querySelectorAll('.cursor-pointer');
            log('.cursor-pointer: ' + sel3.length + ' found');

            var sel4 = parsedDoc.querySelectorAll('a[href*="action=view"]');
            log('a[href*="action=view"]: ' + sel4.length + ' found');

            var sel5 = parsedDoc.querySelectorAll('h2');
            log('h2 tags: ' + sel5.length + ' found');

            // Extract product info
            allProducts = [];
            var cards = sel2.length > 0 ? sel2 : sel1;
            log('\nUsing selector with ' + cards.length + ' cards:');

            cards.forEach(function (card, i) {
                var linkEl = card.querySelector('a[href*="action=view"]');
                var nameEl = card.querySelector('h2');
                var brandEl = card.querySelector('h3');
                var imgEl = card.querySelector('img');

                var product = {
                    name: nameEl ? nameEl.textContent.trim() : 'NO H2',
                    brand: brandEl ? brandEl.textContent.trim() : 'NO H3',
                    link: linkEl ? linkEl.getAttribute('href') : 'NO LINK',
                    img: imgEl ? imgEl.getAttribute('src') : 'NO IMG',
                    text: card.textContent.toLowerCase()
                };
                allProducts.push(product);
                log('  Product ' + (i + 1) + ': ' + product.name + ' | ' + product.brand + ' | ' + product.link);
            });

            if (cards.length === 0) {
                log('\nNO CARDS FOUND! Trying to find product links directly...');
                sel4.forEach(function (link, i) {
                    log('  Link ' + (i + 1) + ': ' + link.getAttribute('href') + ' -> ' + link.textContent.trim().substring(0, 50));
                });

                // Show all div class names to understand structure
                var allDivs = parsedDoc.querySelectorAll('div[class]');
                log('\nAll div classes (first 20):');
                for (var i = 0; i < Math.min(20, allDivs.length); i++) {
                    log('  ' + allDivs[i].className.substring(0, 100));
                }
            }
        }

        function testSearch(keyword) {
            if (allProducts.length === 0) { log('ERROR: Run Step 1 & 2 first!'); return; }

            log('\n=== Searching for "' + keyword + '" ===');
            var matches = allProducts.filter(function (p) {
                return p.text.indexOf(keyword.toLowerCase()) !== -1;
            });
            log('Matches: ' + matches.length + ' / ' + allProducts.length);
            matches.forEach(function (p, i) {
                log('  Match ' + (i + 1) + ': ' + p.name);
            });
        }
    </script>
</body>

</html>
